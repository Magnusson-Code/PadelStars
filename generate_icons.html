<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Genererar ikoner…</title>
<style>body{background:#07111e;color:#7ec8e3;font-family:system-ui;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:20px;margin:0;}
  p{opacity:.6;font-size:14px;}
</style>
</head>
<body>
<h2>🎾 PadelStars – Ikongenererare</h2>
<p>Ikonerna laddas ned automatiskt (icon-192.png och icon-512.png).<br>
   Lägg båda filerna i samma mapp som padel.html.</p>
<script>
const COURT_BLUE_LIGHT = '#1e7ad4';
const COURT_BLUE_DARK  = '#0e4a8a';

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawIcon(canvas) {
  const s   = canvas.width;
  const ctx = canvas.getContext('2d');
  const cx  = s / 2, cy = s / 2;

  // ── Bakgrund: radial gradient på banblå ──────────────────────────────
  const bg = ctx.createRadialGradient(cx*0.8, cy*0.65, 0, cx, cy, s*0.78);
  bg.addColorStop(0, COURT_BLUE_LIGHT);
  bg.addColorStop(1, COURT_BLUE_DARK);
  ctx.fillStyle = bg;
  roundRect(ctx, 0, 0, s, s, s * 0.22);
  ctx.fill();

  // ── Subtil mittlinje (banelement) ────────────────────────────────────
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth   = s * 0.016;
  ctx.beginPath(); ctx.moveTo(cx, s*0.06); ctx.lineTo(cx, s*0.94); ctx.stroke();
  ctx.restore();

  // ── Vitt racket, vinklat –45° ─────────────────────────────────────────
  ctx.save();
  ctx.translate(cx, cy + s*0.04);
  ctx.rotate(-0.50);
  drawRacket(ctx, s * 0.64);
  ctx.restore();

  // ── Gul boll ─────────────────────────────────────────────────────────
  drawBall(ctx, s * 0.73, s * 0.21, s * 0.088);
}

function drawRacket(ctx, size) {
  const headR   = size * 0.38;
  const gripL   = size * 0.30;
  const gripW   = size * 0.09;
  const throatD = headR * 0.62;
  const color   = '#ffffff';
  const holeClr = '#1565b8';   // banblå hålfärg

  // Grepp
  ctx.fillStyle = color;
  roundRect(ctx, -gripW/2, throatD, gripW, gripL, gripW*0.45);
  ctx.fill();

  // Hals
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-gripW*0.9, throatD);
  ctx.lineTo(-headR*0.44, headR*0.38);
  ctx.lineTo( headR*0.44, headR*0.38);
  ctx.lineTo( gripW*0.9, throatD);
  ctx.closePath(); ctx.fill();

  // Huvud
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(0, 0, headR, 0, Math.PI*2); ctx.fill();

  // Hål
  ctx.fillStyle = holeClr;
  const dotR = headR * 0.072;
  const sp   = headR * 0.295;
  for (let row = -2; row <= 2; row++) {
    for (let col = -2; col <= 2; col++) {
      const dx = col*sp, dy = row*sp;
      if (dx*dx + dy*dy < (headR*0.82)*(headR*0.82)) {
        ctx.beginPath(); ctx.arc(dx, dy, dotR, 0, Math.PI*2); ctx.fill();
      }
    }
  }
}

function drawBall(ctx, x, y, r) {
  const g = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.05, x, y, r);
  g.addColorStop(0,   '#ffffff');
  g.addColorStop(0.4, '#FFE840');
  g.addColorStop(1,   '#c8a800');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(160,110,0,0.5)';
  ctx.lineWidth   = r * 0.1; ctx.stroke();
}

function downloadCanvas(canvas, filename) {
  canvas.toBlob(blob => {
    const a  = document.createElement('a');
    a.href   = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
}

// Generera och ladda ned båda storlekarna
[192, 512].forEach((size, i) => {
  setTimeout(() => {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    drawIcon(c);
    downloadCanvas(c, `icon-${size}.png`);
  }, i * 800);   // liten fördröjning mellan nedladdningarna
});
</script>
</body>
</html>
